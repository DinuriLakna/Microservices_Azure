version: '3.8'

services:
  item-service:
    build: ./item-service
    ports:
      - "5001:5001"

  order-service:
    build: ./order-service
    ports:
      - "5002:5002"

  payment-service:
    build: ./payment-service
    ports:
      - "5003:5003"

  api-gateway:
    build: ./api-gateway
    ports:
      - "5000:5000"
    depends_on:
      - item-service
      - order-service
      - payment-service